name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  quality:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    env:
      # Sayfalar build-time'da (generateStaticParams/SSG) gerçekten Prisma
      # üzerinden veri okuduğu için CI'de gerçek (geçici) bir Postgres kullanılır.
      # Supabase'e özgü sırlar (anon key vb.) build sırasında sorgulanmaz,
      # bu yüzden placeholder olarak kalabilir.
      DATABASE_URL: "postgresql://postgres:postgres@localhost:5432/postgres"
      DIRECT_URL: "postgresql://postgres:postgres@localhost:5432/postgres"
      NEXT_PUBLIC_SUPABASE_URL: "https://placeholder.supabase.co"
      NEXT_PUBLIC_SUPABASE_ANON_KEY: "placeholder"
      NEXT_PUBLIC_SITE_URL: "http://localhost:3000"
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install
        run: npm ci

      - name: Prisma validate + generate
        run: npx prisma validate && npx prisma generate

      - name: Lint
        run: npm run lint

      - name: Typecheck
        run: npm run typecheck

      - name: Unit tests
        run: npm test

      - name: Apply Supabase auth-schema shim (CI-only Postgres compatibility)
        run: npx prisma db execute --file prisma/ci/auth-shim.sql --url "$DATABASE_URL"

      - name: Apply migrations
        run: npx prisma migrate deploy

      - name: Seed database
        run: npm run db:seed

      - name: Build
        run: npm run build
